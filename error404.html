<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Seite nicht gefunden</title>
    <link rel="icon" type="image/png" href="/icons/favicon-96x96.png?v=20260426" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg?v=20260426" />
    <link rel="shortcut icon" href="/icons/favicon.ico?v=20260426" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png?v=20260426" />
    <meta name="apple-mobile-web-app-title" content="SimLab" />
    <link rel="manifest" href="/icons/site.webmanifest?v=20260426" />
</head>
<body>

<div class="bg"></div>

<main class="glass-container">
    <div class="glass-card">

        <img src="images/logo.png" alt="SimLab Logo" style="width: 400px; margin-bottom: 20px;">

        <h1 class="error-code">404</h1>
        <h2>Seite nicht gefunden</h2>

        <p>
            Die angeforderte Seite existiert nicht oder wurde verschoben.
            Vielleicht hilft dir einer der folgenden Wege weiter.
        </p>

        <div class="actions">
            <a href="/" class="btn primary">Startseite</a>
            <button onclick="history.back()" class="btn">⬅ Zurück</button>
        </div>

    </div>
</main>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Inter", sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    overflow: hidden;
}

/* Hintergrund Glow */
.bg::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0, 255, 255, 0.2), transparent);
    top: 20%;
    left: 10%;
    filter: blur(100px);
    animation: float 8s ease-in-out infinite;
}

.bg::after {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(255, 0, 255, 0.2), transparent);
    bottom: 10%;
    right: 15%;
    filter: blur(120px);
    animation: float 10s ease-in-out infinite reverse;
}

/* Animation */
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-40px); }
}

/* Layout */
.glass-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
}

/* Glass Card */
.glass-card {
    backdrop-filter: blur(20px);
    background: rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 60px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    max-width: 500px;
}

/* Typo */
.error-code {
    font-size: 120px;
    font-weight: 800;
    background: linear-gradient(90deg, cyan, magenta);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
}

h2 {
    font-size: 28px;
    margin-bottom: 15px;
}

p {
    opacity: 0.8;
    margin-bottom: 30px;
}

/* Buttons */
.actions {
    display: flex;
    gap: 15px;
    justify-content: center;
}

.btn {
    padding: 12px 20px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer;
}

.btn:hover {
    transform: translateY(-3px);
    background: rgba(255,255,255,0.2);
}

.btn.primary {
    background: linear-gradient(135deg, cyan, magenta);
    border: none;
}
</style>

<script>
    setTimeout(() => {
        // Optional Redirect nach 10 Sekunden
        // window.location.href = "/";
    }, 10000);
</script>

</body>
</html>
