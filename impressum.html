<main>

<section class="team-section">
    <div class="team-header">
        <h1>Unser Team</h1>
        <p>Die Menschen hinter den Ideen.</p>
    </div>

    <div class="team-grid">
        <div class="team-card" onclick="openMember(this)" data-email="max@firma.de" data-phone="+49 123 456789">
            <img src="./images/1.jpg" alt="">
            <div class="team-info">
                <h3>Max Mustermann</h3>
                <span>CEO & Founder</span>
                <p>Strategie, Vision und Produktentwicklung.</p>
            </div>
        </div>

        <div class="team-card" onclick="openMember(this)" data-email="anna@firma.de" data-phone="+49 123 456789">
            <img src="./images/2.jpg" alt="">
            <div class="team-info">
                <h3>Anna Beispiel</h3>
                <span>Design Lead</span>
                <p>UI/UX und visuelle Markenidentität.</p>
            </div>
        </div>
    </div>
</section>

<div class="team-overlay" id="teamOverlay">
    <div class="overlay-content" onclick="event.stopPropagation()">
        <span class="close" onclick="closeMember()">×</span>

        <img id="overlayImg">
        <h2 id="overlayName"></h2>
        <h4 id="overlayRole"></h4>
        <p id="overlayText"></p>

        <div class="contact-info">
            <p><strong>Email:</strong> <span id="overlayEmail"></span></p>
            <p><strong>Telefon:</strong> <span id="overlayPhone"></span></p>
        </div>
    </div>
</div>

</main>

<cookie-consent
    position="bottom"
    theme="glass"
    storage-key="consentGiven"
></cookie-consent>
