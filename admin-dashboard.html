<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/liquid-glass.css">
    <link rel="icon" type="image/png" href="/icons/favicon-96x96.png?v=20260426" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg?v=20260426" />
    <link rel="shortcut icon" href="/icons/favicon.ico?v=20260426" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png?v=20260426" />
    <meta name="apple-mobile-web-app-title" content="SimLab" />
    <link rel="manifest" href="/icons/site.webmanifest?v=20260426" />

    <link rel="stylesheet" href="css/admin-dashboard.css">
</head>
<body>

    <script src="./js/footer.js"></script>
    <script src="./js/consent-element.js"></script>

<script src="./js/navbar.js" type="module"></script>
<liquid-glass-navbar></liquid-glass-navbar>

<main>

    <section class="dashboard">
        <div class="glass sidebar">
            <h3>Admin</h3>

            <button data-page="posts">Blog</button>
            <button data-page="events">Events</button>
            <button data-page="projects">Projekte</button>
            <button data-page="users">User</button>

            <hr>

            <button id="logoutBtn">Logout</button>
        </div>

        <div class="glass content" id="contentArea">
            <h2>Willkommen</h2>
        </div>
    </section>

</main>

<div id="modal" class="modal hidden">
  <div class="modal-backdrop"></div>

  <div class="modal-content glass">

    <!-- HEADER -->
    <div class="modal-header">
      <h3 id="modalTitle">Editor</h3>
      <button id="modalClose">✕</button>
    </div>

    <!-- TABS -->
    <div class="modal-tabs">
      <button data-tab="content" class="active">Content</button>
      <button data-tab="media">Media</button>
      <button data-tab="settings">Settings</button>
    </div>

    <!-- TAB CONTENT -->
    <div class="modal-body">

      <!-- CONTENT TAB -->
      <div class="tab active" id="tab-content">
        <form id="modalForm"></form>
      </div>

      <!-- MEDIA TAB -->
      <div class="tab" id="tab-media">

        <div class="dropzone" id="dropzone">
          <p>📁 Bilder reinziehen oder klicken</p>
          <input type="file" multiple hidden />
        </div>

        <div id="gallery" class="gallery"></div>

      </div>

      <!-- SETTINGS TAB -->
      <div class="tab" id="tab-settings">

        <div id="eventFields" class="hidden">
          <label>Datum</label>
          <input type="date" name="eventDate" />

          <label>Start</label>
          <input type="time" name="eventStart" />

          <label>Ende</label>
          <input type="time" name="eventEnd" />
        </div>

      </div>

    </div>

    <!-- ACTIONS -->
    <div class="modal-actions">
      <button id="modalCancel">Abbrechen</button>
      <button id="modalSave" class="primary">Speichern</button>
    </div>

  </div>
</div>

<cookie-consent
    position="bottom"
    theme="glass"
    storage-key="consentGiven"
></cookie-consent>

<br><br><br>

<glass-footer
    brand="SimLab"
    description="Students for Surgery"
    theme="gold"
    links='[
        {"title":"Navigation","items":[
            {"label":"Start","href":"./"},
            {"label":"Login","href":"auth-service.html"},
            {"label":"Dashboard","href":"dashboard.html"},
            {"label":"Blog","href":"blog.html"},
            {"label":"Termine","href":"termine-und-veranstaltungen.html"},
            {"label":"Projekte","href":"projekte.html"}
        ]},
        {"title":"Legal","items":[
            {"label":"Impressum","href":"impressum.html"},
            {"label":"Datenschutz","href":"datenschutz.html"},
            {"label":"Über uns","href":"ueber-uns.html"}
        ]}
    ]'
    socials='[
        {"type":"instagram","href":"#"}
    ]'
></glass-footer>

<script src="./js/admin-dashboard.js" type="module"></script>

</body>
</html>
