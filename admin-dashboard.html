<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/liquid-glass.css">
    <link rel="icon" type="image/png" href="/icons/favicon-96x96.png?v=20260426" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg?v=20260426" />
    <link rel="shortcut icon" href="/icons/favicon.ico?v=20260426" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png?v=20260426" />
    <meta name="apple-mobile-web-app-title" content="SimLab" />
    <link rel="manifest" href="/icons/site.webmanifest?v=20260426" />

    <link rel="stylesheet" href="css/admin-dashboard.css">
</head>
<body>

    <script src="./js/footer.js"></script>
    <script src="./js/consent-element.js"></script>

<script src="./js/navbar.js" type="module"></script>
<liquid-glass-navbar></liquid-glass-navbar>

<main>

    <section class="dashboard">
        <div class="glass sidebar">
            <h3>Admin</h3>
            <button data-page="posts">Posts</button>
            <button data-page="projects">Projekte</button>
        </div>

        <div class="glass content" id="contentArea">
            <h2>Willkommen</h2>
        </div>
    </section>

</main>

<cookie-consent
    position="bottom"
    theme="glass"
    storage-key="consentGiven"
></cookie-consent>

<glass-footer
    brand="SimLab"
    description="Students for Surgery"
    theme="gold"
    links='[
        {"title":"Navigation","items":[
            {"label":"Start","href":"./"},
            {"label":"Login","href":"login.html"},
            {"label":"Dashboard","href":"dashboard.html"},
            {"label":"Blog","href":"blog.html"},
            {"label":"Termine","href":"termine-und-veranstaltungen.html"},
            {"label":"Projekte","href":"projekte.html"}
        ]},
        {"title":"Legal","items":[
            {"label":"Impressum","href":"impressum.html"},
            {"label":"Datenschutz","href":"datenschutz.html"},
            {"label":"Über uns","href":"ueber-uns.html"}
        ]}
    ]'
    socials='[
        {"type":"instagram","href":"#"}
    ]'
></glass-footer>

<script src="./js/admin-dashboard.js" type="module"></script>

</body>
</html>
